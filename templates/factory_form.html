{% extends "base.html" %}
{% block title %}{{ 'Edit' if mode == 'edit' else 'Add' }} Factory · DKNS Tea Lands{% endblock %}
{% block content %}
<div class="page-header">
  <div>
    <h1>{{ 'Edit' if mode == 'edit' else 'Add' }} Factory</h1>
  </div>
</div>

<div class="panel">
  <form method="post" action="{{ url_for('factory_edit', factory_id=factory_id) if mode == 'edit' else url_for('factory_new') }}" class="form-grid">
    <div class="field">
      <label>Name</label>
      <input type="text" name="name" value="{{ factory.get('name') or '' }}" required>
    </div>
    <div class="field">
      <label>Contact person</label>
      <input type="text" name="contact_person" value="{{ factory.get('contact_person') or '' }}">
    </div>
    <div class="field">
      <label>Phone number</label>
      <input type="text" name="phone_number" value="{{ factory.get('phone_number') or '' }}">
    </div>
    <div class="field">
      <label>Default price per kg</label>
      <input type="number" step="0.01" min="0" name="default_price_per_kg" value="{{ factory.get('default_price_per_kg') if factory.get('default_price_per_kg') is not none else '' }}" placeholder="e.g. 280.00">
    </div>
    <div class="field" style="grid-column: span 2;">
      <label>Address</label>
      <input type="text" name="address" value="{{ factory.get('address') or '' }}">
    </div>
    <div class="field" style="align-self:end;">
      <button class="btn" type="submit">{{ 'Save Changes' if mode == 'edit' else 'Add Factory' }}</button>
      <a class="btn btn-secondary" href="{{ url_for('factory_list') }}">Cancel</a>
    </div>
  </form>
</div>
{% endblock %}
